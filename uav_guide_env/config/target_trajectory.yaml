# ═══════════════════════════════════════════════════════════════
# 目标轨迹参数（环境层使用）
# 从 Python config/target_trajectory.json 迁移
# ═══════════════════════════════════════════════════════════════

initial_position: [4000.0, 3200.0, 600.0]  # [x, y, z]
# initial_heading_deg: 90                      # 初始航向 (°)
trajectory_type: "circle"                     # static / line / racetrack / circle

trajectories:
  static:
    speed_mps: 0

  line:
    direction_deg: 0.0           # 运动方向 (°)：0=北+Y，90=东+X，180=南-Y，270=西-X
    speed_mps: 15.0                         # 速度 (m/s)
    length_m: 6000.0                        # 最大行程 (m)

  racetrack:
    straight_length_m: 1000.0               # 直线段长度 (m)
    turn_radius_m: 300.0                    # 弯道半径 (m)
    direction_deg: 90.0           # 起始方向 (°)：0=北，90=东
    altitude_m: 600.0                       # 飞行高度 (m)
    lap_speed_mps: 30.0                     # 绕圈速度 (m/s)

  circle:
    center: [2000.0, 1500.0, 600.0]        # 圆心 [x, y, z]
    radius_m: 100.0                         # 半径 (m)
    angular_speed_dps: 0.5                  # 角速度 (°/s)

# ═══════════════════════════════════════════════════════════════
# 终端逼近与路径规划控制（Phase 3 Full, alg_phase3_full.md）
# ═══════════════════════════════════════════════════════════════

approach_distance: 200.0       # 终端直飞逼近距离 L (m)：规划到目标后方/前方 L 处

# ── Tracking 模式 ─────────────────────────────────────────
tracking_entry_dist: 2000.0     # 进入 tracking 的最大 UAV-目标距离 (m)
tracking_window: 100.0          # 趋势评估窗口距离 (m)
divergence_threshold: 3         # 连续远离次数阈值 (>此值退出 tracking)
virtual_goal_tolerance: 200.0   # 到达 virtual_goal 的容忍距离 (m)

# ── 双模式竞标 ───────────────────────────────────────────
dual_plan_enabled: true         # 是否启用尾追+迎头双规划竞标

