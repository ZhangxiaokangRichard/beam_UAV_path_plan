# ═══════════════════════════════════════════════════════════════
# Beam Dubins 算法参数配置
# 从 Python config/environment.json 的 beam_dubins 块迁移
# ═══════════════════════════════════════════════════════════════

# ── 束搜索参数 ──────────────────────────────────────────────
beam_width: 4                  # 束宽度（每层保留节点数）
beam_width_max: 8              # 最大束宽度（搜索早期自适应使用）
max_depth: 200                 # 最大搜索深度（层数）
max_extend_length: 500.0       # 最大扩展步长 (m)
min_extend_length: 100.0       # 最小扩展步长 (m)
goal_tolerance_xy: 50.0        # 目标命中容差 XY (m)
goal_tolerance_z: 30.0         # 目标命中容差 Z (m)
dubins_shot_interval: 1        # 每 N 层尝试一次 Dubins final-shot
min_diversity_separation: 100.0 # 多样性剪枝最小节点间距 (m)

# ── 评分器权重 ──────────────────────────────────────────────
scorer:
  w_h: 1.2                      # 启发式权重（到目标的距离）
  w_c: 0.05                     # clearance 奖励权重（空旷区偏好）
  w_p: 0.3                      # 进度奖励权重（全局推进偏好）

# ── UAV 运动学约束 ─────────────────────────────────────────
uav:
  cruise_speed_mps: 50.0        # 巡航速度 (m/s)
  min_turn_radius_m: 500.0      # 最小水平转弯半径 (m)
  max_pitch_angle_deg: 5.0      # 最大俯仰角 (°)
  collision_radius_m: 5.0       # 碰撞球半径 (m)

# ── 搜索空间边界（与 uav_guide_env 共用）───────────────────
space:
  lx: 10000.0                   # X 范围 (m)
  ly: 5000.0                    # Y 范围 (m)
  lz: 1000.0                    # Z 范围 (m)
  boundary_margin: 50.0         # 边界安全距离 (m)
